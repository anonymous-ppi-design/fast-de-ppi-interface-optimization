seed: 37
sequence_column: design_sequence
score_column: active_learning_score
mutation_count_column: mutation_count
methods:
- no_head_latent
- trainable_head
- frozen_rfh
active_training:
  rounds: 1
  batch_size: 64
  epochs_per_round: 0
  learning_rate: 0.0003
  generated_per_round: 16
  add_top_per_round: 8
  latent_optimization_steps: 2
  latent_optimization_lr: 0.05
  latent_l2_penalty: 0.01
  convergence_metric: top20_mean_score
  convergence_patience: 3
  convergence_min_delta: 0.01
rfh:
  n_heads: 4
  feature_dim: 64
  ridge_alpha: 1.0
  bootstrap_fraction: 0.8
  uncertainty_penalty: 0.05
trainable_head:
  hidden_dim: 64
  dropout: 0.1
generation:
  mutation_budget_min: 3
  mutation_budget_max: 25
  temperature: 0.9
